name: Test Custom Action

on:
  push:

jobs:
  test-action:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Run My Action
        uses: Ashwinkumar-k10/verilator-lint-action@v1

        with:
          files: "alu.sv counter.sv"
          severity: warning
